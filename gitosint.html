<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitOsint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.25);--dim:rgba(255,255,255,.07);
--outfit:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--outfit);min-height:100vh;overflow-x:hidden;}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;}
.orb1{width:600px;height:500px;background:rgba(255,255,255,.03);top:-150px;left:-150px;animation:d1 14s ease-in-out infinite alternate}
.orb2{width:500px;height:600px;background:rgba(200,200,200,.02);bottom:-200px;right:-120px;animation:d2 18s ease-in-out infinite alternate}
.orb3{width:350px;height:350px;background:rgba(255,255,255,.018);top:35%;left:55%;animation:d1 10s ease-in-out infinite alternate-reverse}
@keyframes d1{to{transform:translate(50px,40px) scale(1.1)}}
@keyframes d2{to{transform:translate(-40px,50px) scale(1.08)}}
.noise{position:fixed;inset:0;opacity:.022;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
.bsk{position:fixed;top:18px;right:22px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.5);z-index:10;pointer-events:none;}

.page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px 80px;}
.site-title{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.15);margin-bottom:40px;font-family:var(--mono);}

.search{width:100%;max-width:460px;margin-bottom:36px}
.input-wrap{position:relative;margin-bottom:6px}
.main-input{width:100%;background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.1);color:var(--text);font-family:var(--outfit);font-size:30px;font-weight:500;padding:10px 0;outline:none;transition:border-color .25s;caret-color:#fff;letter-spacing:-.3px;}
.main-input::placeholder{color:rgba(255,255,255,.1)}
.main-input:focus{border-bottom-color:rgba(255,255,255,.25)}
.glow-line{position:absolute;bottom:-1px;left:0;right:0;height:1.5px;background:rgba(255,255,255,.7);box-shadow:0 0 8px rgba(255,255,255,.3);transform:scaleX(0);transform-origin:left center;transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.main-input:focus~.glow-line{transform:scaleX(1)}
.tok-toggle{display:inline-flex;align-items:center;gap:5px;margin-top:8px;color:rgba(255,255,255,.25);font-size:12px;cursor:pointer;user-select:none;transition:color .2s;}
.tok-toggle:hover{color:rgba(255,255,255,.5)}
.tok-toggle .ico{width:14px;height:14px;border:1.2px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .25s;flex-shrink:0;}
.tok-toggle.open .ico{transform:rotate(45deg)}
.tok-wrap{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s cubic-bezier(.4,0,.2,1),opacity .25s;}
.tok-wrap.open{max-height:60px;opacity:1}
.tok-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-family:var(--mono);font-size:12px;padding:9px 0;outline:none;margin-top:10px;transition:border-color .2s,color .2s;}
.tok-input::placeholder{color:rgba(255,255,255,.1)}
.tok-input:focus{border-bottom-color:rgba(255,255,255,.22);color:rgba(255,255,255,.6)}
.scan-btn{display:block;margin:30px auto 0;background:#fff;color:#0a0a0a;font-family:var(--outfit);font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:13px 46px;border:none;border-radius:100px;cursor:pointer;transition:transform .15s,box-shadow .25s,filter .2s;}
.scan-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 40px rgba(255,255,255,.14),0 0 0 5px rgba(255,255,255,.05);filter:brightness(.92);}
.scan-btn:active:not(:disabled){transform:scale(.96)}
.scan-btn:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.2);cursor:not-allowed;box-shadow:none}

.card{
  width:100%;max-width:540px;
  background:rgba(255,255,255,.028);
  backdrop-filter:blur(56px) saturate(1.8);-webkit-backdrop-filter:blur(56px) saturate(1.8);
  border:1px solid rgba(255,255,255,.06);border-radius:24px;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07),0 0 0 1px rgba(255,255,255,.02),0 50px 140px rgba(0,0,0,.85);
  opacity:0;transform:translateY(22px) scale(.97);
  transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.34,1.35,.64,1);
  pointer-events:none;
}
.card.on{opacity:1;transform:none;pointer-events:auto}

.prog-track{height:1.5px;background:rgba(255,255,255,.05)}
.prog-fill{height:100%;width:0%;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.4);transition:width .5s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);background-size:100px 100%;animation:sh 1.2s linear infinite;}
@keyframes sh{from{background-position:-100px 0}to{background-position:260px 0}}

.info-list{
  max-height:520px;overflow-y:auto;
  padding:8px 0 10px;
}
.info-list::-webkit-scrollbar{width:2px}
.info-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}

.row{
  display:flex;align-items:baseline;
  padding:5px 26px;
  transition:background .1s;
}
.row:hover{background:rgba(255,255,255,.015)}

.row-divider{
  padding:10px 26px 4px;
  display:flex;align-items:center;gap:10px;
}
.row-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05);}
.row-divider-label{font-family:var(--mono);font-size:8.5px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.12);}

.k{
  font-family:var(--mono);font-size:10px;
  color:rgba(255,255,255,.2);
  width:112px;flex-shrink:0;
  padding-top:1px;
}
.v{
  font-family:var(--mono);font-size:11px;
  color:rgba(255,255,255,.75);
  flex:1;word-break:break-all;
}
.v.nil{color:rgba(255,255,255,.12)}
.v a{color:rgba(255,255,255,.5);text-decoration:none;}
.v a:hover{color:rgba(255,255,255,.85)}
.v .cp{
  background:transparent;border:none;
  color:rgba(255,255,255,.15);font-family:var(--mono);font-size:9px;
  cursor:pointer;padding:0 0 0 8px;transition:color .15s;vertical-align:middle;
}
.v .cp:hover{color:rgba(255,255,255,.7)}

.c-foot{padding:12px 26px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.12);}
.xbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.4);font-family:var(--outfit);font-size:11px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s;}
.xbtn:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.14)}
.sbtn{background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.16);color:rgba(200,200,200,.7);font-family:var(--outfit);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s;margin-left:auto;}
.sbtn:hover{background:rgba(255,60,60,.14)}
.rbtn{background:transparent;border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.22);font-family:var(--outfit);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .15s;margin-left:auto;}
.rbtn:hover{border-color:rgba(255,255,255,.16);color:rgba(255,255,255,.6)}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(255,255,255,.94);color:#0a0a0a;font-family:var(--outfit);font-size:12px;font-weight:600;padding:9px 18px;border-radius:100px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:100;box-shadow:0 8px 28px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="noise"></div>
<div class="bsk">&#128187; BsK</div>
<div class="toast" id="toast"></div>

<div class="page">
  <div class="site-title">GitOsint</div>

  <div class="search">
    <div class="input-wrap">
      <input class="main-input" id="uInput" type="text" placeholder="username" autocomplete="off" spellcheck="false">
      <div class="glow-line"></div>
    </div>
    <div class="tok-toggle" id="tokToggle" onclick="toggleTok()">
      <div class="ico"><svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><rect x="3.25" y="0" width="1.5" height="8" rx=".75"/><rect x="0" y="3.25" width="8" height="1.5" rx=".75"/></svg></div>
      token
    </div>
    <div class="tok-wrap" id="tokWrap">
      <input class="tok-input" id="tInput" type="password" placeholder="ghp_···" autocomplete="off" spellcheck="false">
    </div>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">Scan</button>
  </div>

  <div class="card" id="card">
    <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
    <div class="info-list" id="infoList"></div>
    <div class="c-foot" id="foot"></div>
  </div>
</div>

<script>
const G={abort:false,emails:new Map(),commits:0,repos:0,target:'',scanDate:'',profile:null};
const $=id=>document.getElementById(id);

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function toggleTok(){const w=$('tokWrap'),t=$('tokToggle');const o=w.classList.toggle('open');t.classList.toggle('open',o);if(o)setTimeout(()=>$('tInput').focus(),180);}
function hdrs(){const t=$('tInput').value.trim();const h={'Accept':'application/vnd.github.v3+json'};if(t)h['Authorization']='token '+t;return h;}
async function api(url){const r=await fetch(url,{headers:hdrs()});if(r.status===403||r.status===429)throw new Error('rate');if(r.status===404)throw new Error('not_found');if(!r.ok)throw new Error('e'+r.status);return r.json();}
function setPct(p){$('pFill').style.width=p+'%';}

const list=$('infoList');

function divider(label){
  const d=document.createElement('div');d.className='row-divider';
  d.innerHTML='<span class="row-divider-label">'+label+'</span>';
  list.appendChild(d);
}

function row(key,val,opts){
  opts=opts||{};
  const r=document.createElement('div');r.className='row';
  if(opts.id)r.id=opts.id;
  const isEmpty=val===null||val===undefined||val==='';
  const display=isEmpty?'—':String(val);
  let vHtml;
  if(!isEmpty&&opts.link){
    vHtml='<a href="'+val+'" target="_blank">'+display+'</a>';
  } else if(!isEmpty&&opts.copyable){
    const safe=display.replace(/'/g,"&#39;");
    vHtml=display+'<button class="cp" onclick="cpVal(this,\''+safe+'\')">copy</button>';
  } else {
    vHtml=display;
  }
  r.innerHTML='<span class="k">'+key+'</span><span class="v'+(isEmpty?' nil':'')+'">'+vHtml+'</span>';
  list.appendChild(r);
  return r;
}

function setRowVal(id,val,opts){
  opts=opts||{};
  const r=document.getElementById(id);if(!r)return;
  const v=r.querySelector('.v');if(!v)return;
  const isEmpty=val===null||val===undefined||val==='';
  v.className='v'+(isEmpty?' nil':'');
  const display=isEmpty?'—':String(val);
  if(!isEmpty&&opts.copyable){
    const safe=display.replace(/'/g,"&#39;");
    v.innerHTML=display+'<button class="cp" onclick="cpVal(this,\''+safe+'\')">copy</button>';
  } else {
    v.textContent=display;
  }
}

function cpVal(btn,val){navigator.clipboard.writeText(val).then(()=>{btn.textContent='✓';showToast('Copied');setTimeout(()=>btn.textContent='copy',1400)});}

function buildInitialList(){
  list.innerHTML='';
  divider('profile');
  row('id',null,{id:'r-id'});
  row('login',null,{id:'r-login'});
  row('name',null,{id:'r-name'});
  row('bio',null,{id:'r-bio'});
  row('type',null,{id:'r-type'});
  row('site admin',null,{id:'r-admin'});
  row('hireable',null,{id:'r-hireable'});
  divider('contact');
  row('email',null,{id:'r-email'});
  row('location',null,{id:'r-loc'});
  row('company',null,{id:'r-company'});
  row('website',null,{id:'r-blog'});
  row('twitter',null,{id:'r-twitter'});
  row('github url',null,{id:'r-url'});
  divider('stats');
  row('public repos',null,{id:'r-pub-repos'});
  row('public gists',null,{id:'r-pub-gists'});
  row('followers',null,{id:'r-followers'});
  row('following',null,{id:'r-following'});
  divider('dates');
  row('created at',null,{id:'r-created'});
  row('updated at',null,{id:'r-updated'});
  divider('scan');
  row('repos scanned',null,{id:'r-repos-s'});
  row('commits scanned',null,{id:'r-commits-s'});
  row('emails found',null,{id:'r-emails-s'});
  divider('emails');
}

function fillProfile(u){
  function fmt(v){return(v!==null&&v!==undefined&&v!=='')?String(v):null;}
  function fmtDate(v){return v?v.replace('T',' ').replace('Z',' UTC'):null;}
  setRowVal('r-id',fmt(u.id));
  setRowVal('r-login',fmt(u.login));
  setRowVal('r-name',fmt(u.name));
  setRowVal('r-bio',fmt(u.bio));
  setRowVal('r-type',fmt(u.type));
  setRowVal('r-admin',u.site_admin?'yes':'no');
  setRowVal('r-hireable',u.hireable===true?'yes':u.hireable===false?'no':null);
  setRowVal('r-email',fmt(u.email),{copyable:true});
  setRowVal('r-loc',fmt(u.location));
  setRowVal('r-company',fmt(u.company));
  const blogEl=document.getElementById('r-blog');
  if(blogEl){const v=blogEl.querySelector('.v');if(u.blog){v.className='v';v.innerHTML='<a href="'+u.blog+'" target="_blank">'+u.blog+'</a>';}else{v.className='v nil';v.textContent='—';}}
  const twEl=document.getElementById('r-twitter');
  if(twEl){const v=twEl.querySelector('.v');if(u.twitter_username){v.className='v';v.innerHTML='<a href="https://twitter.com/'+u.twitter_username+'" target="_blank">@'+u.twitter_username+'</a>';}else{v.className='v nil';v.textContent='—';}}
  const urlEl=document.getElementById('r-url');
  if(urlEl){const v=urlEl.querySelector('.v');v.className='v';v.innerHTML='<a href="'+u.html_url+'" target="_blank">'+u.html_url+'</a>';}
  setRowVal('r-pub-repos',fmt(u.public_repos));
  setRowVal('r-pub-gists',fmt(u.public_gists));
  setRowVal('r-followers',fmt(u.followers));
  setRowVal('r-following',fmt(u.following));
  setRowVal('r-created',fmtDate(u.created_at));
  setRowVal('r-updated',fmtDate(u.updated_at));
}

function updateScanStats(){
  setRowVal('r-repos-s',G.repos);
  setRowVal('r-commits-s',G.commits);
  setRowVal('r-emails-s',G.emails.size);
}

function addEmail(addr,src){
  if(!addr)return;
  addr=addr.trim().toLowerCase();
  if(/noreply|no-reply/.test(addr))return;
  src=src||'unknown';
  if(G.emails.has(addr)){
    const d=G.emails.get(addr);d.hits++;
    const hitEl=document.getElementById('eh-'+G.emails.size);// not used, emails are unique ids
    return;
  }
  G.emails.set(addr,{source:src,firstSeen:new Date().toISOString(),hits:1});
  updateScanStats();
  const idx=G.emails.size;
  const r=document.createElement('div');r.className='row';
  r.style.animation='fadeIn .22s ease both';
  const safe=addr.replace(/'/g,"&#39;");
  r.innerHTML='<span class="k">email '+idx+'</span><span class="v">'+addr+'<button class="cp" onclick="cpVal(this,\''+safe+'\')">copy</button></span>';
  list.appendChild(r);
  list.scrollTop=list.scrollHeight;
}

function setFoot(scanning){
  const f=$('foot');
  f.innerHTML=scanning
    ?'<span style="font-size:10px;color:rgba(255,255,255,.18);font-family:var(--mono)">scanning…</span><button class="sbtn" onclick="G.abort=true">stop</button>'
    :'<button class="xbtn" onclick="xCSV()">CSV</button><button class="xbtn" onclick="xJSON()">JSON</button><button class="rbtn" onclick="reset()">reset</button>';
}

async function startScan(){
  const user=$('uInput').value.trim();
  if(!user)return $('uInput').focus();
  G.abort=false;G.emails.clear();G.commits=0;G.repos=0;G.profile=null;
  G.target=user;G.scanDate=new Date().toISOString();
  $('scanBtn').disabled=true;
  $('card').classList.add('on');
  buildInitialList();
  setPct(2);setFoot(true);
  try{
    const u=await api('https://api.github.com/users/'+user);
    if(G.abort)throw new Error('abort');
    G.profile=u;
    fillProfile(u);
    if(u.email)addEmail(u.email,'profile');
    setPct(10);
    let repos=[],page=1;
    while(!G.abort){
      const b=await api('https://api.github.com/users/'+user+'/repos?per_page=100&page='+page+'&sort=pushed');
      if(!b.length)break;
      repos=[...repos,...b.filter(r=>!r.fork)];
      setRowVal('r-repos-s',repos.length);
      if(b.length<100)break;page++;
    }
    setPct(18);
    const all=[...repos,null];
    for(let i=0;i<all.length;i++){
      if(G.abort)break;
      if(all[i]===null)await scanEv(user);
      else await scanRepo(all[i],user);
      setPct(18+Math.round(((i+1)/all.length)*78));
    }
    if(!G.abort)setPct(100);
  }catch(e){
    const m={abort:'',not_found:'not found',rate:'rate limit — add a token'};
    if(e.message!=='abort'){
      const er=document.createElement('div');er.className='row';
      er.innerHTML='<span class="k">error</span><span class="v nil">'+(m[e.message]||e.message)+'</span>';
      list.appendChild(er);
    }
  }
  $('scanBtn').disabled=false;setFoot(false);
}

async function scanRepo(r,user){
  setRowVal('r-repos-s',G.repos);
  try{
    const cs=await api('https://api.github.com/repos/'+r.full_name+'/commits?per_page=100&author='+user);
    for(const c of cs){
      if(G.abort)return;
      G.commits++;
      addEmail(c.commit?.author?.email,r.name);
      const ce=c.commit?.committer?.email;
      if(ce&&ce!==c.commit?.author?.email)addEmail(ce,r.name+' (committer)');
    }
    G.repos++;updateScanStats();
  }catch(e){}
}

async function scanEv(user){
  try{
    const evs=await api('https://api.github.com/users/'+user+'/events/public?per_page=100');
    for(const ev of evs){if(G.abort)return;ev.payload?.commits?.forEach(c=>addEmail(c.author?.email,'events'));}
  }catch(e){}
}

function reset(){
  G.emails.clear();G.commits=0;G.repos=0;G.profile=null;
  $('infoList').innerHTML='';
  $('card').classList.remove('on');
  setPct(0);$('foot').innerHTML='';
}

function slug(){return(G.target||'scan').replace(/[^a-z0-9_-]/gi,'_')}
function dl(name,data,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();showToast('Exported '+name);}

function totalSources(){const s=new Set();G.emails.forEach(d=>s.add(d.source));return s.size;}

function xCSV(){
  const p=G.profile;
  const meta=[
    '# GitOsint Export',
    '# ─────────────────────────────────────',
    '# Tool         : GitOsint',
    '# Scan date    : '+G.scanDate,
    '# ─────────────────────────────────────',
    '# Target       : @'+G.target,
    '# Display name : '+(p?.name||'—'),
    '# GitHub URL   : https://github.com/'+G.target,
    '# ID           : '+(p?.id||'—'),
    '# Type         : '+(p?.type||'—'),
    '# Site admin   : '+(p?.site_admin?'yes':'no'),
    '# Hireable     : '+(p?.hireable===true?'yes':p?.hireable===false?'no':'—'),
    '# Email        : '+(p?.email||'—'),
    '# Location     : '+(p?.location||'—'),
    '# Company      : '+(p?.company||'—'),
    '# Website      : '+(p?.blog||'—'),
    '# Twitter      : '+(p?.twitter_username?('@'+p.twitter_username):'—'),
    '# Bio          : '+((p?.bio||'—').replace(/\r?\n/g,' ')),
    '# Created at   : '+(p?.created_at||'—'),
    '# Updated at   : '+(p?.updated_at||'—'),
    '# Public repos : '+(p?.public_repos??'—'),
    '# Public gists : '+(p?.public_gists??'—'),
    '# Followers    : '+(p?.followers??'—'),
    '# Following    : '+(p?.following??'—'),
    '# ─────────────────────────────────────',
    '# Repos scanned: '+G.repos,
    '# Commits scan : '+G.commits,
    '# Emails found : '+G.emails.size,
    '# Unique srcs  : '+totalSources(),
    '# ─────────────────────────────────────',
    '',
    'rank,email,source,first_seen'
  ].join('\r\n');
  const rows=[...G.emails.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([e,d],i)=>(i+1)+',"'+e+'","'+d.source+'","'+d.firstSeen+'"');
  dl('gitosint_'+slug()+'.csv',meta+'\r\n'+rows.join('\r\n'),'text/csv;charset=utf-8');
}

function xJSON(){
  const p=G.profile;
  const out={
    meta:{tool:'GitOsint',scan_date:G.scanDate,stats:{repos_scanned:G.repos,commits_scanned:G.commits,emails_found:G.emails.size,unique_sources:totalSources()}},
    target:{
      id:p?.id||null,login:G.target,name:p?.name||null,type:p?.type||null,site_admin:p?.site_admin??null,hireable:p?.hireable??null,
      github_url:'https://github.com/'+G.target,avatar_url:p?.avatar_url||null,
      bio:p?.bio||null,email:p?.email||null,location:p?.location||null,company:p?.company||null,blog:p?.blog||null,twitter_username:p?.twitter_username||null,
      public_repos:p?.public_repos??null,public_gists:p?.public_gists??null,followers:p?.followers??null,following:p?.following??null,
      created_at:p?.created_at||null,updated_at:p?.updated_at||null
    },
    emails:[...G.emails.entries()].sort((a,b)=>a[0].localeCompare(b[0])).map(([email,d],i)=>({rank:i+1,email,source:d.source,first_seen:d.firstSeen}))
  };
  dl('GitOsint_'+slug()+'.json',JSON.stringify(out,null,2),'application/json');
}

$('uInput').addEventListener('keydown',e=>{if(e.key==='Enter')startScan()});
</script>
</body>
